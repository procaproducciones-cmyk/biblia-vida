name: Generar APK Biblia Vida

on:
  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: read

jobs:

  compilar-apk:

    name: Compilar APK Android

    runs-on: ubuntu-latest

    steps:

      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependencias
        run: |
          npm config set registry https://registry.npmjs.org/
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Preparar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Dar permiso a Gradle
        run: chmod +x android/gradlew

      - name: Compilar APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Preparar APK
        run: |
          mkdir -p salida
          cp android/app/build/outputs/apk/debug/app-debug.apk salida/Biblia-Vida-v1.0.0.apk

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: Biblia-Vida-APK
          path: salida/Biblia-Vida-v1.0.0.apk
